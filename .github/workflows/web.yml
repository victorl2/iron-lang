name: Web CI

on:
  push:
    branches: [main]
    paths:
      - '.emsdk-version'
      - '.github/workflows/web.yml'
      - 'scripts/ci-smoke/**'
      - 'src/analyzer/analyzer.c'
      - 'src/analyzer/analyzer.h'
      - 'src/analyzer/web_await_check.c'
      - 'src/analyzer/web_await_check.h'
      - 'src/cli/build.c'
      - 'src/cli/build.h'
      - 'src/cli/build_web.c'
      - 'src/cli/build_web.h'
      - 'src/cli/check.c'
      - 'src/cli/main.c'
      - 'src/cli/toml.c'
      - 'src/cli/toml.h'
      - 'src/cli/web_config.h'
      - 'src/diagnostics/diagnostics.h'
      - 'src/lir/emit_c.c'
      - 'src/lir/emit_helpers.h'
      - 'src/lir/emit_web.c'
      - 'src/lir/emit_web.h'
      - 'src/lir/lir.h'
      - 'src/lir/web_main_loop_split.c'
      - 'src/lir/web_main_loop_split.h'
      - 'src/runtime/iron_builtins.c'
      - 'src/runtime/iron_collections.c'
      - 'src/runtime/iron_rc.c'
      - 'src/runtime/iron_runtime.h'
      - 'src/runtime/iron_string.c'
      - 'src/runtime/iron_threads.c'
      - 'src/stdlib/iron_time_web.c'
      - 'tests/integration/web/hello.iron'
      - 'tests/integration/web/test_cli_parse.c'
      - 'tests/unit/CMakeLists.txt'
      - 'tests/unit/test_emit_web.c'
      - 'tests/unit/test_string_intern_race.c'
      - 'tests/unit/test_toml_web.c'
      - 'tests/unit/test_web_await_check.c'
      - 'tests/unit/test_web_main_loop_split.c'
      - 'CMakeLists.txt'
  pull_request:
    branches: [main]
    paths:
      - '.emsdk-version'
      - '.github/workflows/web.yml'
      - 'scripts/ci-smoke/**'
      - 'src/analyzer/analyzer.c'
      - 'src/analyzer/analyzer.h'
      - 'src/analyzer/web_await_check.c'
      - 'src/analyzer/web_await_check.h'
      - 'src/cli/build.c'
      - 'src/cli/build.h'
      - 'src/cli/build_web.c'
      - 'src/cli/build_web.h'
      - 'src/cli/check.c'
      - 'src/cli/main.c'
      - 'src/cli/toml.c'
      - 'src/cli/toml.h'
      - 'src/cli/web_config.h'
      - 'src/diagnostics/diagnostics.h'
      - 'src/lir/emit_c.c'
      - 'src/lir/emit_helpers.h'
      - 'src/lir/emit_web.c'
      - 'src/lir/emit_web.h'
      - 'src/lir/lir.h'
      - 'src/lir/web_main_loop_split.c'
      - 'src/lir/web_main_loop_split.h'
      - 'src/runtime/iron_builtins.c'
      - 'src/runtime/iron_collections.c'
      - 'src/runtime/iron_rc.c'
      - 'src/runtime/iron_runtime.h'
      - 'src/runtime/iron_string.c'
      - 'src/runtime/iron_threads.c'
      - 'src/stdlib/iron_time_web.c'
      - 'tests/integration/web/hello.iron'
      - 'tests/integration/web/test_cli_parse.c'
      - 'tests/unit/CMakeLists.txt'
      - 'tests/unit/test_emit_web.c'
      - 'tests/unit/test_string_intern_race.c'
      - 'tests/unit/test_toml_web.c'
      - 'tests/unit/test_web_await_check.c'
      - 'tests/unit/test_web_main_loop_split.c'
      - 'CMakeLists.txt'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  emsdk-smoke:
    name: emsdk smoke test
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read pinned emsdk version
        id: emsdk_version
        run: echo "version=$(cat .emsdk-version)" >> "$GITHUB_OUTPUT"

      - name: Install emsdk ${{ steps.emsdk_version.outputs.version }}
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: ${{ steps.emsdk_version.outputs.version }}
          actions-cache-folder: emsdk-cache

      - name: Verify emcc version matches pin
        run: |
          PINNED=$(cat .emsdk-version)
          echo "Pinned version: $PINNED"
          emcc --version
          emcc --version | grep -F "$PINNED" || { echo "FAIL: emcc version does not match $PINNED"; exit 1; }
          echo "OK: emcc --version contains $PINNED"

      - name: Compile hello.c via emcc
        run: emcc scripts/ci-smoke/hello.c -o /tmp/hello.js

      - name: Assert smoke test artifacts exist and are non-empty
        run: |
          test -s /tmp/hello.js   || { echo "FAIL: /tmp/hello.js missing or empty"; exit 1; }
          test -s /tmp/hello.wasm || { echo "FAIL: /tmp/hello.wasm missing or empty"; exit 1; }
          echo "OK: hello.js and hello.wasm exist and are non-empty"

      - name: Probe runtime + stdlib files portability under emcc (WEB-RUNTIME-07, WEB-RUNTIME-06)
        run: |
          set -e
          echo "WEB-RUNTIME-07: try-compiling three runtime files under emcc --"
          echo "these files must build cleanly with zero modifications."
          echo "WEB-RUNTIME-06: also try-compiling iron_time_web.c under emcc --"
          echo "this file provides the web time shim (emscripten_get_now / emscripten_date_now)."
          emcc -c src/runtime/iron_rc.c          -I src -Wall -Werror -o /tmp/iron_rc.o
          emcc -c src/runtime/iron_builtins.c    -I src -Wall -Werror -o /tmp/iron_builtins.o
          emcc -c src/runtime/iron_collections.c -I src -Wall -Werror -o /tmp/iron_collections.o
          emcc -c src/stdlib/iron_time_web.c     -I src -Wall -Werror -o /tmp/iron_time_web.o
          test -s /tmp/iron_rc.o          || { echo "FAIL: iron_rc.o empty";          exit 1; }
          test -s /tmp/iron_builtins.o    || { echo "FAIL: iron_builtins.o empty";    exit 1; }
          test -s /tmp/iron_collections.o || { echo "FAIL: iron_collections.o empty"; exit 1; }
          test -s /tmp/iron_time_web.o    || { echo "FAIL: iron_time_web.o empty";    exit 1; }
          echo "OK: iron_rc.c + iron_builtins.c + iron_collections.c + iron_time_web.c compile clean under emcc"

      - name: Configure + build ironc (Phase 7 end-to-end smoke)
        run: |
          set -e
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug
          cmake --build build --target ironc --parallel

      - name: End-to-end smoke — iron build --target=web (Phase 7, WEB-BUILD-01..08)
        run: |
          set -e
          echo "Phase 7 end-to-end: iron build --target=web tests/integration/web/hello.iron"
          echo "Expected: dist/web/index.html, dist/web/index.js, dist/web/index.wasm"

          # Clear any stale output directory from a previous run
          rm -rf dist/web

          # Run the real emcc link via ironc
          ./build/ironc build --target=web tests/integration/web/hello.iron

          # Assert the three output artifacts exist and are non-empty
          test -s dist/web/index.html || { echo "FAIL: dist/web/index.html missing or empty"; exit 1; }
          test -s dist/web/index.js   || { echo "FAIL: dist/web/index.js missing or empty"; exit 1; }
          test -s dist/web/index.wasm || { echo "FAIL: dist/web/index.wasm missing or empty"; exit 1; }
          echo "OK: Phase 7 end-to-end — dist/web/index.{html,js,wasm} all present and non-empty"

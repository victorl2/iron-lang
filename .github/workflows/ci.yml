name: CI

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'CMakeLists.txt'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'CMakeLists.txt'
      - '.github/workflows/**'

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false

    runs-on: ${{ matrix.os }}

    # Windows CI is informational until a dedicated Windows-compat phase
    # fixes pre-existing issues unrelated to Phase 59 networking:
    #   - src/util/strbuf.h uses GCC __attribute__((format(...)))
    #   - src/diagnostics/diagnostics.c includes <unistd.h>
    #   - src/pkg/* + src/cli/toml.c use POSIX-only strdup/getcwd/strerror
    #     under MSVC /W3 /WX which promotes C4996 warnings to errors
    # Phase 59 P01c (iron_net_init.c), P02..P05 networking/URL code, and
    # the cross-platform Unity test (test_stdlib_net_cross_platform.c) DO
    # build under MSVC after the winsock2 include-order + stdlib.h fixes
    # in commit 989ae1b. continue-on-error lets the green Unix matrix
    # report PR status while the Windows job surfaces the pre-existing
    # compat gap for a follow-up phase.
    continue-on-error: ${{ matrix.os == 'windows-latest' }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake ninja

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: choco install cmake ninja -y --installargs 'ADD_CMAKE_TO_PATH=System'

      - name: Configure (Unix — Debug with ASan/UBSan)
        if: runner.os != 'Windows'
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=clang \
            -G Ninja

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -G "Visual Studio 17 2022"

      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: cmake --build build

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: cmake --build build --config Debug

      - name: Run unit tests (Unix)
        if: runner.os != 'Windows'
        env:
          ASAN_OPTIONS: detect_leaks=0
        run: ctest --test-dir build --output-on-failure -j4 -E "benchmark"

      - name: Run unit tests (Windows)
        if: runner.os == 'Windows'
        run: ctest --test-dir build --output-on-failure --config Debug -j4 -E "benchmark|test_integration"

      - name: Verify binaries exist (Unix)
        if: runner.os != 'Windows'
        run: |
          test -x build/iron && echo "iron binary OK"
          test -x build/ironc && echo "ironc binary OK"

      - name: Verify binaries exist (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (Test-Path build/Debug/ironc.exe) { Write-Host "ironc.exe OK" } else { exit 1 }

      - name: Run integration tests (Unix only)
        if: runner.os != 'Windows'
        env:
          ASAN_OPTIONS: detect_leaks=0
        run: |
          chmod +x tests/integration/run_integration.sh
          tests/integration/run_integration.sh build/ironc

      - name: Verify sanitizers (Unix only)
        if: runner.os != 'Windows'
        env:
          ASAN_OPTIONS: detect_leaks=0:abort_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: ctest --test-dir build --output-on-failure -j4 -E "benchmark"

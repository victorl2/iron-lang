name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.0.2-alpha)'
        required: true

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event.release.tag_name || github.event.inputs.tag }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang

      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=clang \
            -G Ninja

      - name: Build
        run: cmake --build build

      - name: Run unit tests
        env:
          ASAN_OPTIONS: detect_leaks=0
        run: ctest --test-dir build --output-on-failure -j4

      - name: Run integration tests
        env:
          ASAN_OPTIONS: detect_leaks=0
        run: |
          chmod +x tests/integration/run_integration.sh
          tests/integration/run_integration.sh build/ironc

  build:
    needs: test
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
            archive_ext: tar.gz
          - os: macos-latest
            target: macos-arm64
            archive_ext: tar.gz
          - os: macos-13
            target: macos-x86_64
            archive_ext: tar.gz
          - os: windows-latest
            target: windows-x86_64
            archive_ext: zip
      fail-fast: false

    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.os == 'windows-latest' }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake ninja

      - name: Configure (Unix)
        if: runner.os != 'Windows'
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=clang \
            -G Ninja

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -G "Visual Studio 17 2022"

      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: cmake --build build

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: cmake --build build --config Release

      - name: Verify version output (Unix)
        if: runner.os != 'Windows'
        run: |
          ./build/ironc --version
          ./build/iron --version

      - name: Verify version output (Windows)
        if: runner.os == 'Windows'
        run: |
          build\Release\ironc.exe --version
          build\Release\iron.exe --version

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          VERSION="${RELEASE_TAG#v}"
          ARCHIVE="iron-${VERSION}-${{ matrix.target }}.tar.gz"
          mkdir -p staging/bin staging/lib/runtime staging/lib/util staging/lib/stdlib staging/lib/vendor
          cp build/iron build/ironc staging/bin/
          cp src/runtime/*.c src/runtime/*.h staging/lib/runtime/
          cp src/util/stb_ds_impl.c src/util/arena.c src/util/arena.h src/util/strbuf.c src/util/strbuf.h staging/lib/util/
          cp src/stdlib/*.c src/stdlib/*.iron staging/lib/stdlib/
          cp -r src/vendor/* staging/lib/vendor/
          cp LICENSE staging/
          tar -czf "${ARCHIVE}" -C staging .
          echo "ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $VERSION = "${{ env.RELEASE_TAG }}".TrimStart("v")
          $ARCHIVE = "iron-${VERSION}-${{ matrix.target }}.zip"
          New-Item -ItemType Directory -Force -Path staging/bin, staging/lib/runtime, staging/lib/util, staging/lib/stdlib, staging/lib/vendor
          Copy-Item build\Release\iron.exe staging\bin\
          Copy-Item build\Release\ironc.exe staging\bin\
          Copy-Item src\runtime\*.c staging\lib\runtime\
          Copy-Item src\runtime\*.h staging\lib\runtime\
          Copy-Item src\util\stb_ds_impl.c, src\util\arena.c, src\util\arena.h, src\util\strbuf.c, src\util\strbuf.h staging\lib\util\
          Copy-Item src\stdlib\*.c staging\lib\stdlib\
          Copy-Item src\stdlib\*.iron staging\lib\stdlib\
          Copy-Item -Recurse src\vendor\* staging\lib\vendor\
          Copy-Item LICENSE staging\
          Compress-Archive -Path staging\* -DestinationPath $ARCHIVE
          echo "ARCHIVE=$ARCHIVE" >> $env:GITHUB_ENV

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: ${{ env.ARCHIVE }}

  upload-install-script:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload install script
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: scripts/install.sh

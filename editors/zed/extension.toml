id = "iron-lsp"
name = "Iron LSP"
version = "0.1.0"
schema_version = 1
authors = ["iron-lang"]
description = "Language support for the Iron programming language"
repository = "https://github.com/iron-lang/iron-lang"

# Phase 6 Plan 06-05 (EXT-08, CONTEXT D-06 + D-11, UI-SPEC S4 + S9).
#
# This manifest declares the Iron LSP extension to Zed. The companion
# src/lib.rs implements the download + SHA-256 verify + spawn flow, and
# languages/iron/config.toml declares the `.iron` language surface.

[language_servers.iron-lsp]
name = "Iron LSP"
languages = ["Iron"]
# UI-SPEC S9 / Phase 7 HARD-22, D-10: out-of-range ironls is a HARD
# REFUSE — src/lib.rs probes the binary's --version and returns an Err
# from language_server_command() when the detected version falls
# outside the range. `compatible_ironls` is kept in sync with the new
# `[version_constraints]` section below for backward compatibility with
# tooling that reads the legacy field.
compatible_ironls = ">= 3.0.0, < 4.0.0"

# Phase 7 Plan 07-07 Task 02 (HARD-22, D-10) — explicit version
# constraints table. src/lib.rs reads this key via the
# IRONLS_COMPATIBLE_RANGE constant; the two MUST stay in sync. The
# `ironls` key matches the LSP server id above so future multi-server
# extensions can express constraints per server.
[version_constraints]
ironls = ">= 3.0.0, < 4.0.0"

# Minimum-permissions capability grant per RESEARCH §V4 Access Control.
# zed_extension_api::download_file only succeeds against hosts the extension
# has declared a capability for. Locking to github.com alone keeps the
# extension from being repurposed as a generic fetcher if an attacker ever
# lands a malicious grammar or config into the repo.
[[capabilities]]
kind = "download_file"
host = "github.com"

# UI-SPEC S4 settings (snake_case per Zed convention).
# iron_lsp_path — explicit override for users who build ironls locally;
# bypasses the entire GitHub-download flow when set to an existing file.
# iron_lsp_log_level — client-side log verbosity passed into logEvent()
# calls in src/lib.rs.
[[settings.iron_lsp_path]]
type = "string"
default = ""
description = "Absolute path to a local `ironls` binary. If empty, the extension downloads from GitHub Releases and verifies SHA-256."

[[settings.iron_lsp_log_level]]
type = "string"
default = "info"
description = "Client-side log verbosity. One of: error | warn | info | debug."

# NOTE: [grammars.iron] is intentionally omitted in v0.1. The tree-sitter
# iron.wasm parser is shipped as a GitHub Release asset alongside ironls
# (Plan 06-02 produces it; Plan 06-06 wires its Release upload). When Zed's
# grammar-from-Release flow stabilises, this section adds:
#   [grammars.iron]
#   repository = "https://github.com/iron-lang/iron-lang"
#   commit = "<iron.wasm-producing commit>"
